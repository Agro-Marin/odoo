[pytest]
# Single entry point for the standalone, database-free unit suites (Tier 1 in
# doc/coding_guidelines.rst §6 "Test infrastructure tiers").  Run them all with:
#
#     pytest                      # from addons/core/
#
# These suites import only the odoo.libs / odoo.orm.components leaf modules via
# sys.modules stubs registered in each suite's conftest (see
# odoo/_testing_bootstrap.py) — they do NOT touch a database or the framework.
#
# The real-import suites under core/tests/ (Tier 2 model_test_env, and the
# service tests) MUST run in a SEPARATE invocation, because the stubs above are
# process-global and would shadow their real `import odoo.*`:
#
#     pytest tests/models tests/service
#
# import-mode=importlib lets each test file import independently (no __init__.py
# in the suites, no same-basename collisions) and must be an addopts CLI arg —
# it has to be active before conftest.py is imported.
addopts = --import-mode=importlib
pythonpath = .
testpaths =
    odoo/orm/components/tests
    odoo/libs/_field_access/tests
