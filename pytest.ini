[pytest]
# Single entry point for the standalone, database-free unit suites (Tier 1 in
# doc/coding_guidelines.rst §6 "Test infrastructure tiers").  Run them all with:
#
#     pytest                      # from addons/core/
#
# These suites import only the odoo.libs / odoo.orm.components leaf modules via
# sys.modules stubs registered in each suite's conftest (see
# odoo/_testing_bootstrap.py) — they do NOT touch a database or the framework.
#
# The Tier-2 real-import suites (odoo/orm/tests model_test_env self-tests,
# odoo/http/tests the pure http-layer unit suites, and tests/service the
# process-free server tests) MUST run in a SEPARATE invocation, because the stubs
# above are process-global and would shadow their real `import odoo.*`:
#
#     pytest odoo/orm/tests odoo/http/tests tests/service  # Tier 2: real import
#
# import-mode=importlib lets each test file import independently (no __init__.py
# in the suites, no same-basename collisions) and must be an addopts CLI arg —
# it has to be active before conftest.py is imported.
addopts = --import-mode=importlib
pythonpath = .
testpaths =
    odoo/orm/components/tests
    odoo/orm/domain/tests
    odoo/db/tests
    odoo/libs/_field_access/tests
    odoo/libs/text/tests
    odoo/libs/tests
    odoo/libs/collections/tests
    odoo/libs/datetime/tests
    odoo/libs/filesystem/tests
    odoo/libs/numbers/tests
    odoo/libs/locale/tests
    odoo/libs/colors/tests
    odoo/libs/email/tests
    odoo/libs/sql/tests
    odoo/libs/web/tests
    odoo/tools/tests
    addons/account/tools/tests
    odoo/addons/base/models/tests
