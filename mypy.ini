# mypy configuration for the Python type-check gate (.github/workflows/py_typecheck.yml).
#
# Scope: the modern, already-typed framework packages, checked in module mode
# (`mypy -p odoo.orm -p odoo.db ...`). The rest of the tree (odoo/addons/**,
# legacy modules) is intentionally out of scope for now — the gate ratchets
# package-by-package, mirroring the TypeScript typecheck gate.
#
# follow_imports = silent keeps the analysis bounded: imports outside the
# checked packages are followed for types but their own errors are not reported.
#
# Phase 2 will tighten per-package (e.g. disallow_untyped_defs = True) as the
# baseline is driven to zero; today the global checks below apply uniformly.

[mypy]
python_version = 3.14
follow_imports = silent
ignore_missing_imports = True
namespace_packages = True
explicit_package_bases = True
warn_unused_configs = True
show_error_codes = True
show_column_numbers = True
# Strict-family checks that are cheap to satisfy and high-signal.
warn_redundant_casts = True
no_implicit_optional = True
strict_equality = True
check_untyped_defs = True

# Generated / vendored code is never type-checked.
[mypy-odoo.libs._vendor.*]
ignore_errors = True

[mypy-odoo.tools.embedded_sass_pb2]
ignore_errors = True
