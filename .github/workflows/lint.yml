name: ESLint Check

# ESLint gate, enforced as a DRIFT-ZERO RATCHET (tooling/ratchet): the committed
# floor (errorCount) is tooling/ratchet/baselines/eslint.json. This gate BLOCKS
# (no continue-on-error). The floor only moves one way — see
# tooling/ratchet/README.md. To change it, run locally and commit:
#   npx eslint . --format=json --output-file=/tmp/eslint.json
#   N=$(jq '[.[].errorCount] | add // 0' /tmp/eslint.json)
#   python tooling/ratchet/ratchet.py eslint --count "$N" --update
#
# The floor is the fork's own JS only: vendored third-party libraries are
# excluded structurally by eslint.config.mjs (`**/static/lib/**`) — vendored code
# lives in static/lib by convention, so there is no per-library allowlist to
# drift. (Floor 2026-06-25: 122843 fork errors; ~46k of that is test files
# missing test globals — a separate follow-up.)
#
# Audit doc: knowledge/.../2026-05-03-web-js-architecture-audit.md item #1

on:
  # Mainline re-verification: re-run the ratchet on every push to a protected
  # branch so direct commits / merge-skew cannot silently drift the floor.
  push:
    branches: ['19.0-marin', '19.0']
  pull_request:
    branches: ['*']
    paths:
      - '**/*.js'
      - '**/*.mjs'
      - 'eslint.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'tooling/ratchet/**'
      - '.github/workflows/lint.yml'

permissions:
  contents: read

jobs:
  lint:
    name: eslint (ratchet)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Self-test the ratchet
        run: python tooling/ratchet/test_ratchet.py

      - name: Install committed dependencies (esbuild, typescript)
        run: npm ci

      - name: Install ESLint and plugins (not yet in root package.json)
        # Versions track addons/web/tooling/_package.json.
        run: |
          npm install --no-save --no-package-lock \
            eslint@^10.0.2 \
            @eslint/js@^10.0.0 \
            globals@^16.0.0 \
            eslint-plugin-prettier@^5.5.5 \
            eslint-config-prettier@^10.1.0 \
            eslint-plugin-simple-import-sort@^12.1.1 \
            prettier@^3.5.0

      - name: Run ESLint
        id: eslint
        run: |
          set +e
          npx eslint . --format=json --output-file=/tmp/eslint.json
          set -e
          ERR_COUNT=$(jq '[.[].errorCount] | add // 0' /tmp/eslint.json)
          WARN_COUNT=$(jq '[.[].warningCount] | add // 0' /tmp/eslint.json)
          echo "error_count=${ERR_COUNT}" >> "$GITHUB_OUTPUT"
          echo "warning_count=${WARN_COUNT}" >> "$GITHUB_OUTPUT"
          # Human-readable rerun for the log (truncated). Cached install makes it fast.
          npx eslint . --format=stylish 2>&1 | head -200 || true

      - name: Enforce ratchet
        run: |
          python tooling/ratchet/ratchet.py eslint --count "${{ steps.eslint.outputs.error_count }}" --json | tee /tmp/verdict.json
          python tooling/ratchet/ratchet.py eslint --count "${{ steps.eslint.outputs.error_count }}"

      - name: Summarise
        if: always()
        run: |
          ERR_COUNT="${{ steps.eslint.outputs.error_count }}"
          WARN_COUNT="${{ steps.eslint.outputs.warning_count }}"
          BASELINE=$(python -c "import json;print(json.load(open('tooling/ratchet/baselines/eslint.json'))['count'])")
          {
            echo "## ESLint check (ratchet)"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|------:|"
            echo "| Errors found | ${ERR_COUNT} |"
            echo "| Warnings found | ${WARN_COUNT} |"
            echo "| Committed floor (errors) | ${BASELINE} |"
            echo "| Drift | $((ERR_COUNT - BASELINE)) |"
            echo ""
            echo "Floor: \`tooling/ratchet/baselines/eslint.json\` · Config: \`eslint.config.mjs\`"
          } >> "$GITHUB_STEP_SUMMARY"
