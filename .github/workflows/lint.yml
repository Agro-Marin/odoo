name: ESLint Check

# Phase 1 of the lint CI gate (companion to typecheck.yml).
#
# WARN-ONLY MODE. The job uses `continue-on-error: true` so lint errors
# surface in the PR summary and as workflow notices, but do NOT block
# merges yet. The gate flips to blocking in Phase 3 once the baseline
# (TBD — populated by the first run on main) has been driven to zero
# in Phase 2.
#
# Phase 2 task: promote ESLint dependencies from the inline `--no-save`
# install below into root `package.json` so `npm ci` covers them and
# the npm cache hits cleanly. Versions to add are listed under
# "Install ESLint" below and track `addons/web/tooling/_package.json`
# (the developer-opt-in template).
#
# Audit doc: `knowledge/agromarin-knowledge/workspaces/workspace-LMMG/2026-05-03-web-js-architecture-audit.md` item #1

on:
  pull_request:
    branches: ['*']
    paths:
      - '**/*.js'
      - '**/*.mjs'
      - 'eslint.config.mjs'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: eslint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true  # Phase 1 warn-only — flip to false in Phase 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install committed dependencies (esbuild, typescript)
        run: npm ci

      - name: Install ESLint and plugins (not yet in root package.json)
        # Versions track addons/web/tooling/_package.json. Promote to root
        # package.json in Phase 2 so npm ci covers them and the cache hits.
        # eslint-plugin-simple-import-sort is fork-local (used by eslint.config.mjs
        # but not present in the upstream tooling template).
        run: |
          npm install --no-save --no-package-lock \
            eslint@^10.0.2 \
            @eslint/js@^10.0.0 \
            globals@^16.0.0 \
            eslint-plugin-prettier@^5.5.5 \
            eslint-config-prettier@^10.1.0 \
            eslint-plugin-simple-import-sort@^12.1.1 \
            prettier@^3.5.0

      - name: Run ESLint
        id: eslint
        run: |
          set +e
          npx eslint . --format=json --output-file=/tmp/eslint.json
          ESLINT_EXIT=$?
          set -e
          # Aggregate counts across all linted files.
          ERR_COUNT=$(jq '[.[].errorCount] | add // 0' /tmp/eslint.json)
          WARN_COUNT=$(jq '[.[].warningCount] | add // 0' /tmp/eslint.json)
          echo "error_count=${ERR_COUNT}" >> "$GITHUB_OUTPUT"
          echo "warning_count=${WARN_COUNT}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${ESLINT_EXIT}" >> "$GITHUB_OUTPUT"
          # Human-readable rerun for the workflow log (truncated to keep noise low).
          # Cached install above means this re-invocation is fast.
          npx eslint . --format=stylish 2>&1 | head -300 || true

      - name: Summarise
        if: always()
        run: |
          ERR_COUNT="${{ steps.eslint.outputs.error_count }}"
          WARN_COUNT="${{ steps.eslint.outputs.warning_count }}"
          # TODO: replace BASELINE with the actual count after the first run on main.
          # The typecheck workflow set its baseline at 6,575 (2026-04-29) — same pattern.
          BASELINE=0
          DRIFT=$((ERR_COUNT - BASELINE))
          if [ "$DRIFT" -ge 0 ]; then
            DRIFT_STR="+${DRIFT}"
          else
            DRIFT_STR="${DRIFT}"
          fi
          {
            echo "## ESLint check"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|------:|"
            echo "| Errors found | ${ERR_COUNT} |"
            echo "| Warnings found | ${WARN_COUNT} |"
            echo "| Phase 0 baseline | ${BASELINE} |"
            echo "| Drift vs baseline | ${DRIFT_STR} |"
            echo ""
            if [ "$DRIFT" -gt 0 ]; then
              echo "> :warning: Error count **increased** by ${DRIFT} since the Phase 0 baseline."
              echo "> This PR may introduce new lint errors. Check the workflow log for details."
            elif [ "$DRIFT" -lt 0 ]; then
              echo "> :white_check_mark: Error count **decreased** by $((-DRIFT)) — thanks for the cleanup."
            else
              echo "> :information_source: Error count unchanged — within the expected baseline."
            fi
            echo ""
            echo "Audit: \`knowledge/agromarin-knowledge/workspaces/workspace-LMMG/2026-05-03-web-js-architecture-audit.md\` item #1"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Annotate PR (warn-only)
        if: always() && steps.eslint.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const errorCount = parseInt('${{ steps.eslint.outputs.error_count }}', 10) || 0;
            const warningCount = parseInt('${{ steps.eslint.outputs.warning_count }}', 10) || 0;
            const baseline = 0;
            const drift = errorCount - baseline;
            const sign = drift >= 0 ? '+' : '';
            core.notice(
              `ESLint: ${errorCount} errors, ${warningCount} warnings (${sign}${drift} vs Phase 0 baseline ${baseline}). ` +
              `Warn-only mode — does not block merge. See workflow Summary tab.`
            );
            if (drift > 0) {
              core.warning(
                `Lint error count increased by ${drift} compared to baseline. ` +
                `Review the workflow log to verify no new errors were introduced.`
              );
            }
